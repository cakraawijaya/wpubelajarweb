<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Elemen Form di dalam Table</title>
  </head>
  <body>
    <h1>Contoh elemen-elemen form pada HTML</h1>

    <br /><br />

    <form>
      <table>
        <tr>
          <td align="right">
            <label for="nama">Nama: </label>
          </td>
          <td>
            <input
              type="text"
              name="nama"
              id="nama"
              placeholder="Masukkan nama"
            />
          </td>
        </tr>
        <tr>
          <td align="right"><label for="password">Password: </label></td>
          <td>
            <input type="password" name="password" id="password" />
          </td>
        </tr>
        <tr>
          <td align="right">
            <label for="email">Email: </label>
          </td>
          <td>
            <input type="email" name="email" id="email" />
          </td>
        </tr>
        <tr>
          <td align="right"><label for="angka">Angka: </label></td>
          <td>
            <input type="number" name="angka" id="angka" min="0" max="100" />
          </td>
        </tr>
        <tr>
          <td align="right"><label for="tanggal">Tanggal: </label></td>
          <td>
            <input type="date" name="tanggal" id="tanggal" />
          </td>
        </tr>
        <tr>
          <td></td>
          <td></td>
        </tr>
        <tr>
          <td align="right"><label for="warna">Warna: </label></td>
          <td>
            <input type="color" name="warna" id="warna" />
          </td>
        </tr>
        <tr>
          <td align="right" colspan="2">
            <button type="submit">Kirim!</button>
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
