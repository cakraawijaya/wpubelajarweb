<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Background</title>
    <style>
      body {
        background-color: lightblue;
        background-image: linear-gradient(to right, lightgreen, lightblue);
        height: 100vh;
      }

      .kotak1 {
        width: 200px;
        height: 200px;
        background-color: salmon;
        background-image: linear-gradient(to bottom, salmon, red);
      }

      .kotak2 {
        width: 200px;
        height: 200px;
        background-color: lightgreen;
        background-image: radial-gradient(red, orange);
      }

      .kotak3 {
        width: 200px;
        height: 200px;
        background-color: orange;
        background-image: conic-gradient(red, yellow);
      }
    </style>
  </head>
  <body>
    <div class="kotak1"></div>
    <div class="kotak2"></div>
    <div class="kotak3"></div>
  </body>
</html>
